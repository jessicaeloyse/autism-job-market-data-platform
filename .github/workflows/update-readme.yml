name: Update README Structure

on:
  pull_request:
    branches:
      - master
    types:
      - closed

jobs:

  update-readme:

    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run README updater
        run: |
          python agents/readme_structure_agent/readme_updater.py

      - name: Commit changes
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "docs: update project structure"

          git push